site_name: K100 Build
theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Build Log: build-log/index.md
  - Parts: parts.md
  - Wiring: wiring/index.md

exclude_docs: |
  superpowers/

extra_css:
  - wiring/wiring.css
extra_javascript:
  - wiring/wiring.js
